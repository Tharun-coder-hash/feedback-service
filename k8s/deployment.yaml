# 1. The Deployment (Manages your containers)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-service-deployment
  labels:
    app: feedback-service
spec:
  replicas: 2 # This tells Kubernetes to run 2 copies of your app!
  selector:
    matchLabels:
      app: feedback-service
  template:
    metadata:
      labels:
        app: feedback-service
    spec:
      containers:
      - name: feedback-service
        image: my-docker-registry/feedback-service:latest 
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# 2. The Service (Acts as a traffic cop for your containers)
apiVersion: v1
kind: Service
metadata:
  name: feedback-service-clusterip
spec:
  type: ClusterIP
  selector:
    app: feedback-service
  ports:
  - port: 80
    targetPort: 8080
